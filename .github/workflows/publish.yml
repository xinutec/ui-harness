# Publish @xinutec/ui-harness to GitHub Packages on a version tag (v*).
# Uses the built-in GITHUB_TOKEN (packages:write) — no manually-created token.
name: publish
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://npm.pkg.github.com
          scope: '@xinutec'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test # never publish a harness whose own fixtures are red
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
